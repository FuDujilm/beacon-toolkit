name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag. Leave empty to use v<pubspec version>-build.<run_number>."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_CHANNEL: stable

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      artifact_prefix: ${{ steps.meta.outputs.artifact_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pubspec version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          version_name="${version%%+*}"
          input_tag="${{ github.event.inputs.release_tag }}"
          if [[ -n "$input_tag" ]]; then
            release_tag="$input_tag"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="v${version_name}-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "app_version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=beacon-toolkit-${release_tag}" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" ]]; then
            if [[ -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" || -z "${ANDROID_STORE_PASSWORD}" ]]; then
              echo "ANDROID_KEYSTORE_BASE64 is set, but ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD or ANDROID_STORE_PASSWORD is missing." >&2
              exit 1
            fi
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
            {
              printf 'storePassword=%s\n' "${ANDROID_STORE_PASSWORD}"
              printf 'keyPassword=%s\n' "${ANDROID_KEY_PASSWORD}"
              printf 'keyAlias=%s\n' "${ANDROID_KEY_ALIAS}"
              printf 'storeFile=app/upload-keystore.jks\n'
            } > android/key.properties
          else
            echo "Android signing secrets are not configured; Gradle will use the debug fallback signing config."
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${{ needs.prepare.outputs.artifact_prefix }}-android.apk"
          cp build/app/outputs/bundle/release/app-release.aab "dist/${{ needs.prepare.outputs.artifact_prefix }}-android.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Package Web
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cd build/web
          zip -r "../../dist/${{ needs.prepare.outputs.artifact_prefix }}-web.zip" .

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/*
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev liblzma-dev libsqlite3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev ninja-build pkg-config zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Patch desktop_webview_window Linux cookie expiry
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          pub_cache = Path(os.environ.get("PUB_CACHE", Path.home() / ".pub-cache"))
          plugin_dirs = [path.parent for path in pub_cache.glob("hosted/*/desktop_webview_window-*/linux/webview_window.cc")]
          if not plugin_dirs:
              raise SystemExit("desktop_webview_window linux plugin not found")

          gdatetime_patch = "\n".join([
              "    GDateTime *expires_at = soup_cookie_get_expires(cookie);",
              "    gdouble expires = expires_at == nullptr ? -1 : g_date_time_to_unix(expires_at);",
          ])
          soupdate_patch = "\n".join([
              "    SoupDate *expires_at = soup_cookie_get_expires(cookie);",
              "    gdouble expires = expires_at == nullptr ? -1 : soup_date_to_time_t(expires_at);",
          ])
          patterns = [
              "    gdouble expires = g_date_time_get_seconds(soup_cookie_get_expires(cookie));",
              gdatetime_patch,
              soupdate_patch,
          ]
          replacement = gdatetime_patch

          for plugin_dir in plugin_dirs:
              source = plugin_dir / "webview_window.cc"
              text = source.read_text()
              for pattern in patterns:
                  text = text.replace(pattern, replacement)
              source.write_text(text)

              cmake = plugin_dir / "CMakeLists.txt"
              cmake_text = cmake.read_text()
              link_line = "target_link_libraries(${PLUGIN_NAME} PRIVATE PkgConfig::LibSoup)"
              if link_line not in cmake_text:
                  cmake_text = cmake_text.replace(
                      "target_link_libraries(${PLUGIN_NAME} PRIVATE PkgConfig::WebKit)",
                      "target_link_libraries(${PLUGIN_NAME} PRIVATE PkgConfig::WebKit)\\n" + link_line,
                  )
                  cmake.write_text(cmake_text)

              print(f"Patched {plugin_dir}")
          PY

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf "dist/${{ needs.prepare.outputs.artifact_prefix }}-linux-x64.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "dist\${{ needs.prepare.outputs.artifact_prefix }}-windows-x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app "dist/${{ needs.prepare.outputs.artifact_prefix }}-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*
          if-no-files-found: error

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without codesigning
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r "dist/${{ needs.prepare.outputs.artifact_prefix }}-ios-unsigned.ipa" Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-android
      - build-web
      - build-linux
      - build-windows
      - build-macos
      - build-ios
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Beacon Toolkit ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            Automated multi-platform release for Beacon Toolkit.

            Artifacts:
            - Android APK and AAB
            - Web zip
            - Linux x64 tar.gz
            - Windows x64 zip
            - macOS app zip
            - iOS unsigned IPA
